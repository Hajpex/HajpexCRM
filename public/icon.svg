<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262625"/>
      <stop offset="1" stop-color="#161615"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (maskable-safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- serif H within central safe zone -->
  <text x="50%" y="50%" dy="0.04em"
        text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="300" font-weight="500" fill="#ECECEA">H</text>
  <!-- brand accent dot -->
  <circle cx="358" cy="332" r="22" fill="#E0A33E"/>
</svg>
